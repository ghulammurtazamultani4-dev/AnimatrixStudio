<!DOCTYPE html>
<html>
<head>
<title>Animatrix 3D Studio</title>
<style>
body { margin:0; overflow:hidden; background:black; }
#ui {
position:absolute;
top:20px;
left:20px;
z-index:10;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:10px;
background:#a855f7;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div id="ui">
<button onclick="setAnim('idle')">Idle</button>
<button onclick="setAnim('walk')">Walk</button>
<button onclick="setAnim('run')">Run</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.155.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

let renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Light
let light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);

// Ground
let ground = new THREE.Mesh(
new THREE.PlaneGeometry(50,50),
new THREE.MeshStandardMaterial({color:0x222222})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// Character
let mixer;
let actions = {};
let currentAction;

let loader = new THREE.GLTFLoader();

// Sample free model
loader.load("https://threejs.org/examples/models/gltf/Soldier.glb", function(gltf){

let model = gltf.scene;
scene.add(model);

model.scale.set(2,2,2);

mixer = new THREE.AnimationMixer(model);

gltf.animations.forEach((clip)=>{
actions[clip.name] = mixer.clipAction(clip);
});

currentAction = actions[Object.keys(actions)[0]];
currentAction.play();

});

camera.position.set(0,2,5);

function setAnim(name){

if(actions[name]){
currentAction.fadeOut(0.5);
currentAction = actions[name];
currentAction.reset().fadeIn(0.5).play();
}

}

let clock = new THREE.Clock();

function animate(){

requestAnimationFrame(animate);

if(mixer){
mixer.update(clock.getDelta());
}

renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
